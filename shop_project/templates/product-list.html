{% extends 'main.html' %}

{% block header_link %}
    <link rel="stylesheet" href="{{ url_for('static', path='product-list.css') }}">
{% endblock %}

{% block content %}
    <div class="container">
        <h1>لیست محصولات</h1>

        <div class="products">
            <!-- Product 1 -->

            {% for product in products %}
            	<div class="product-card">
                <div class="product-image">Product Image</div>
                <div class="product-info">
                    <div class="product-name">{{ product.name }}</div>
                    <div class="product-price">{{ '{:,}'.format(product.price) }} تومان </div>
                    <div class="product-description">{{ product.description | truncate(30) }}</div>
                    <a class="btn" href="{{ url_for('product_detail', product_id=product.id) }}">مشاهده جزئیات</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
