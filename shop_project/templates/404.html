{% extends 'main.html' %}

{% block header_link %}

{% endblock %}

{% block content %}

        <div class="error-content">
            <div class="error-icon">🔍</div>
            <div class="error-code">404</div>
            <h1 class="error-title">صفحه مورد نظر یافت نشد</h1>
            <p class="error-description">
                متاسفانه صفحه ای که به دنبال آن هستید یافت نشد.
            </p>
            <div class="action-buttons">
                <a href="{{ url_for("products") }}" class="btn btn-primary">بازگشت به لیست محصولات</a>
            </div>

        </div>
    </div>
{% endblock %}
